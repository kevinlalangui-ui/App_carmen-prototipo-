<h3 mat-dialog-title>Cursos del socio</h3>

<mat-dialog-content>
  <div class="seccion">
    <p class="seccion-titulo">Apuntado actualmente</p>
    @if (apuntados.size === 0) {
      <p class="vacio">Sin cursos asignados</p>
    } @else {
      @for (curso of cursoService.cursos(); track curso.id) {
        @if (estaApuntado(curso)) {
          <div class="curso-activo">
            <span>{{ curso.nombre }}</span>
            <button class="btn-quitar" (click)="toggleCurso(curso)">✕</button>
          </div>
        }
      }
    }
  </div>

  <div class="seccion">
    <p class="seccion-titulo">Cursos disponibles</p>
    @for (curso of cursoService.cursos(); track curso.id) {
      <div class="curso-item">
        <input
          type="checkbox"
          [id]="'curso-' + curso.id"
          [checked]="estaApuntado(curso)"
          (change)="toggleCurso(curso)"
        />
        <label [for]="'curso-' + curso.id">{{ curso.nombre }}</label>
      </div>
    }
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Cerrar</button>
  <button aling="start" mat-button (click)="guardar()">Guardar</button>
</mat-dialog-actions>
