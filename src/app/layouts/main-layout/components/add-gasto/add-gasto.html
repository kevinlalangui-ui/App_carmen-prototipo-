<h3 mat-dialog-title>➕ Añadir gasto</h3>

<mat-dialog-content>
  <div class="campo">
    <label>Monto (€)</label>
    <input
      type="number"
      step="0.01"
      [(ngModel)]="monto"
      (blur)="validarMonto()"
      placeholder="Ej: 50.00"
    />
    <small class="error" *ngIf="errorMonto">{{ errorMonto }}</small>
  </div>

  <div class="campo">
    <label>Descripción</label>
    <input [(ngModel)]="descripcion" placeholder="Ej: Compra de supermercado" />
  </div>

  <div class="campo">
    <label>Fecha del gasto</label>
    <mat-form-field appearance="outline" class="full-width">
      <input
        matInput
        [matDatepicker]="picker"
        [(ngModel)]="fechaDate"
        (dateChange)="onFechaChange($event)"
      />
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>
    <small class="text-muted">Selecciona una fecha en el calendario</small>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancelar</button>
  <button
    class="btn-guardar"
    (click)="confirm()"
    [disabled]="!monto || !descripcion.trim() || !fecha"
  >
    Guardar
  </button>
</mat-dialog-actions>
